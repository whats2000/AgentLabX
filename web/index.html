<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function(){
        var t = localStorage.getItem("agentlabx-theme") || "system";
        var dark = t === "dark" || (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="same-origin" />

    <title>AgentLabX — Open Research Automation Platform</title>
    <meta
      name="description"
      content="AgentLabX is a local-first research-automation platform. A user defines a research topic; LLM-powered agents execute the full workflow end-to-end — literature review, plan formulation, experimentation, interpretation, report writing, and peer review — with per-user encrypted credentials, observable events, and reproducible artifacts."
    />
    <meta
      name="keywords"
      content="research automation, LLM agents, AI research, literature review, experimentation, reproducible research, MCP, FastAPI, local-first"
    />
    <meta name="author" content="AgentLabX contributors" />
    <meta name="application-name" content="AgentLabX" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0f172a" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgentLabX" />
    <meta property="og:title" content="AgentLabX — Open Research Automation Platform" />
    <meta
      property="og:description"
      content="LLM-powered agents run the full research workflow end-to-end — literature → plan → experiments → report → peer review. Local-first, observable, reproducible."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AgentLabX — Open Research Automation Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AgentLabX — Open Research Automation Platform" />
    <meta
      name="twitter:description"
      content="LLM-powered agents run the full research workflow end-to-end — literature → plan → experiments → report → peer review. Local-first, observable, reproducible."
    />
    <meta name="twitter:image" content="/og-image.svg" />
    <meta name="twitter:image:alt" content="AgentLabX — Open Research Automation Platform" />

    <!-- Preconnect to the loopback API for slightly snappier first calls -->
    <link rel="preconnect" href="http://127.0.0.1:8765" />
  </head>
  <body>
    <noscript>
      <div style="max-width: 640px; margin: 4rem auto; padding: 1rem; font-family: ui-sans-serif, system-ui, sans-serif; color: #0f172a;">
        <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">AgentLabX</h1>
        <p>This application requires JavaScript. Enable JavaScript in your browser and reload the page.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
