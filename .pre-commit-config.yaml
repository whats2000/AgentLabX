# Pre-commit hooks for AgentLabX.
#
# Install once per clone:   uv run pre-commit install
# Run manually on all files: uv run pre-commit run --all-files
# Skip hooks (rare):         git commit --no-verify
#
# Heavy checks (mypy, pytest) are deferred to CI — pre-commit must stay fast.

repos:
  # ----- generic hygiene -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ----- backend (Python) -----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # ----- frontend (TypeScript / TSX / JSON / CSS) -----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^web/src/.*\.(ts|tsx|json|css)$
        additional_dependencies:
          - prettier@3.8.3
