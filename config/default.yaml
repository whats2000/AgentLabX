server:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]

llm:
  default_model: "claude-sonnet-4-6"
  temperature: 0.0
  max_retries: 3
  cost_ceiling: 10.00

pipeline:
  default_sequence:
    - literature_review
    - plan_formulation
    - data_exploration
    - data_preparation
    - experimentation
    - results_interpretation
    - report_writing
    - peer_review
  max_total_iterations: 50
  default_mode: "auto"

execution:
  backend: "subprocess"
  timeout: 120
  memory_limit: "4g"

storage:
  backend: "sqlite"
  database_url: "sqlite:///data/agentlabx.db"
  artifacts_path: "./data/artifacts"

budget_policy:
  warning_threshold: 0.7
  critical_threshold: 0.9
  hard_ceiling: 1.0

lab_meeting:
  enabled: true
  triggers:
    consecutive_failures: 3
    score_plateau_rounds: 2
    scheduled_interval: null
  participants: "auto"
  max_discussion_rounds: 5
